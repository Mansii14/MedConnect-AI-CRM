databases:
  - name: medconnect-db
    plan: free

services:
  # Backend API Service (FastAPI)
  - type: web
    name: medconnect-api
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medconnect-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: MODEL_NAME
        value: gemma2-9b-it
      - key: GROQ_API_KEY
        value: "" # Enter your Groq API Key in the Render dashboard after creation

  # Frontend Static Site (React Vite)
  - type: web
    name: medconnect-crm
    plan: free
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: "" # Enter your backend service URL in the Render dashboard after creation
